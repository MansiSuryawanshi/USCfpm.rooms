<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC FPM Room Checks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="logo-text">
                    <span class="usc-text">USC</span><span class="fpm-text">FPM</span>
                    <div class="logo-sub">Facilities Planning and Management</div>
                </div>
            </div>
            <h1>Network Services</h1>
            <p class="subtitle">Daily Meeting Room Checks</p>
            <p id="datetime" class="datetime"></p>
        </header>

        <main id="rooms-container">
            <!-- Rooms will be dynamically loaded here -->
            <div class="loading">Loading rooms...</div>
        </main>

        <footer>
            <button id="done-btn" class="btn btn-primary">Done</button>
        </footer>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Generated Report</h2>
            <p>Copy and paste this into your message.</p>
            <textarea id="report-text" readonly></textarea>
            <button id="copy-btn" class="btn btn-secondary">Copy to Clipboard</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
